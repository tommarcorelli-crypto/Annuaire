<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MANPAGES.EXE — Paquets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=VT323&family=Honk&family=Noto+Sans+JP:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/favicon-32.png"/>
  <meta name="theme-color" content="#0f0820"/>
  <style>
    /* ── Variables (copie du thème Terminal Arcade) ── */
    :root, [data-theme="dark"] {
      --bg:#0f0820; --bg2:#160d2e; --bg3:#1f1340;
      --border:#2d1f5a; --border2:#3d2a73;
      --accent:#ff2e88; --accent-2:#5ce1ff; --accent-3:#ffd60a;
      --accent-glow:rgba(255,46,136,0.2);
      --ink:#f5f0e1; --text:#d9d2e8; --muted:#8576b8;
      --mono:'JetBrains Mono',ui-monospace,monospace;
      --pixel:'VT323','JetBrains Mono',monospace;
      --nav-h:58px; --shadow-hard:4px 4px 0 #000;
    }
    [data-theme="light"] {
      --bg:#f5f1e6; --bg2:#ecdfc8; --bg3:#fffaf0;
      --border:#1a1a24; --border2:#3a3a44;
      --accent:#e63946; --accent-2:#2a6df4; --accent-3:#ffba08;
      --accent-glow:rgba(230,57,70,0.16);
      --ink:#0e0e16; --text:#1a1a24; --muted:#5a5a6a;
      --shadow-hard:4px 4px 0 #1a1a24;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--mono); min-height:100vh; }

    /* ── NAV ── */
    .nav {
      position:sticky; top:0; z-index:50;
      height:var(--nav-h); display:flex; align-items:center; gap:16px;
      padding:0 20px; background:var(--bg2);
      border-bottom:2px solid var(--border2);
    }
    .nav-logo {
      font-family:var(--pixel); font-size:20px; color:var(--ink);
      text-decoration:none; white-space:nowrap; letter-spacing:.05em;
    }
    .nav-logo span { color:var(--accent); }
    .nav-tabs { display:flex; gap:4px; flex:1; }
    .nav-tab {
      padding:6px 14px; font-family:var(--pixel); font-size:15px;
      border:2px solid var(--border2); background:transparent;
      color:var(--muted); cursor:pointer; text-decoration:none;
      transition:all .15s; white-space:nowrap;
    }
    .nav-tab:hover, .nav-tab.active {
      border-color:var(--accent-2); color:var(--accent-2);
      transform:translate(-1px,-1px); box-shadow:2px 2px 0 var(--accent-2);
    }
    .nav-right { display:flex; align-items:center; gap:8px; margin-left:auto; }
    .theme-toggle {
      background:transparent; border:2px solid var(--border2);
      color:var(--muted); width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .15s;
    }
    .theme-toggle:hover { border-color:var(--accent-3); color:var(--accent-3); }
    .theme-toggle svg { width:15px; height:15px; }
    [data-theme="dark"] .icon-sun { display:none; }
    [data-theme="light"] .icon-moon { display:none; }
    .search-pkg {
      background:var(--bg3); border:2px solid var(--border2);
      color:var(--text); font-family:var(--mono); font-size:13px;
      padding:6px 12px; outline:none; width:220px; transition:border-color .15s;
    }
    .search-pkg:focus { border-color:var(--accent-2); }
    .search-pkg::placeholder { color:var(--muted); }

    /* ── HERO ── */
    .pkg-hero {
      padding:40px 24px 28px; text-align:center;
      border-bottom:2px solid var(--border);
    }
    .pkg-eyebrow { font-family:var(--pixel); font-size:16px; color:var(--accent); letter-spacing:.12em; margin-bottom:10px; }
    .pkg-title { font-family:var(--pixel); font-size:clamp(28px,5vw,46px); color:var(--ink); letter-spacing:.06em; }
    .pkg-title span { color:var(--accent-2); }
    .pkg-sub { color:var(--muted); font-size:13px; margin-top:10px; }

    /* ── FILTRES CATÉGORIE ── */
    .cat-bar {
      display:flex; gap:6px; flex-wrap:wrap; padding:16px 20px;
      border-bottom:2px solid var(--border); background:var(--bg2);
      position:sticky; top:var(--nav-h); z-index:40;
    }
    .cat-btn {
      padding:5px 14px; font-family:var(--pixel); font-size:14px;
      border:2px solid var(--border2); background:transparent;
      color:var(--muted); cursor:pointer; transition:all .12s;
    }
    .cat-btn:hover { border-color:var(--accent-3); color:var(--accent-3); }
    .cat-btn.active { border-color:var(--accent-3); color:var(--accent-3); background:color-mix(in srgb,var(--accent-3) 12%,var(--bg)); }

    /* ── TABLEAU ── */
    .pkg-wrap { padding:20px; }
    .pkg-wrap-inner { overflow-x:auto; }
    .pkg-table {
      width:100%; border-collapse:collapse; min-width:700px; font-size:11px;
    }

    /* En-tête OS */
    .pkg-table thead tr th {
      background:var(--bg2); border:1px solid var(--border2);
      padding:5px 7px; text-align:center; font-family:var(--pixel);
      font-size:10px; white-space:nowrap;
      position:sticky; top:0; z-index:30; vertical-align:middle;
    }
    .pkg-table thead tr th:first-child { text-align:left; min-width:130px; }

    /* OS icon dans l'en-tête */
    .th-os { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .th-os-icon {
      width:18px; height:18px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .th-os-icon img, .th-os-icon svg { width:11px; height:11px; filter:brightness(0) invert(1); }
    .th-os-label { font-size:9px; }

    /* Corps du tableau */
    .pkg-table tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    .pkg-table tbody tr:hover { background:var(--bg3); }
    .pkg-table tbody tr.hidden { display:none; }

    .pkg-table td {
      padding:5px 7px; border-right:1px solid var(--border); vertical-align:middle;
    }
    .pkg-table td:last-child { border-right:none; }

    /* Cellule nom du paquet */
    .pkg-name-cell { min-width:130px; max-width:155px; }
    .pkg-name {
      font-family:var(--pixel); font-size:14px; color:var(--ink);
      display:block; margin-bottom:1px;
    }
    .pkg-desc { color:var(--muted); font-size:10px; line-height:1.3; }
    .pkg-cat-badge {
      display:inline-block; margin-top:2px;
      padding:0px 5px; font-size:9px; font-family:var(--pixel);
      border:1px solid; letter-spacing:.04em;
    }

    /* Cellule commande d'installation */
    .install-cell { min-width:120px; }
    .install-cmd {
      display:flex; align-items:center; gap:4px;
      background:var(--bg3); border:1px solid var(--border2);
      padding:3px 6px; cursor:pointer; transition:all .12s;
      text-align:left; width:100%;
    }
    .install-cmd:hover { border-color:var(--accent-2); }
    .install-cmd code {
      flex:1; font-family:var(--mono); font-size:10px; color:var(--accent-2);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .install-cmd .copy-ico { flex-shrink:0; color:var(--muted); transition:color .12s; }
    .install-cmd:hover .copy-ico { color:var(--accent-2); }
    .install-cmd .copy-ico svg { width:10px; height:10px; }
    .install-cmd.copied { border-color:var(--accent-3); }
    .install-cmd.copied code { color:var(--accent-3); }

    /* Cellule N/A */
    .na-cell { color:var(--border2); text-align:center; font-size:13px; }

    /* Ligne de groupe de catégorie */
    .cat-row td {
      background:var(--bg2); color:var(--accent); font-family:var(--pixel);
      font-size:11px; padding:3px 10px; border-top:2px solid var(--border2);
      letter-spacing:.1em;
    }

    /* ── COMPTEUR ── */
    .pkg-stats {
      padding:8px 20px; font-family:var(--pixel); font-size:13px;
      color:var(--muted); border-bottom:1px solid var(--border);
    }
    .pkg-stats span { color:var(--accent-3); }

    /* ── VIDE ── */
    .pkg-empty {
      display:none; text-align:center; padding:60px 20px;
      color:var(--muted); font-family:var(--pixel); font-size:18px;
    }
    .pkg-empty.show { display:block; }

    /* ── PRINT ── */
    @media print {
      .nav, .cat-bar, .copy-ico { display:none !important; }
      body { background:#fff !important; color:#000 !important; }
      .install-cmd { border:1px solid #000 !important; }
      .install-cmd code { color:#000 !important; }
    }
  </style>
</head>

  // ════════════════════════════════════════════════════
  // RENDU DU TABLEAU
  // ════════════════════════════════════════════════════
  var OS_KEYS   = ['debian','alpine','arch','rhel','freebsd','macos','windows'];
  var CAT_COLORS = {
    'Web':        '#ff2e88', 'BDD':     '#5ce1ff', 'Sécurité': '#ffd60a',
    'Système':    '#a855f7', 'DevOps':  '#22d3ee', 'Réseau':   '#34d399',
    'Langage':    '#fb923c', 'Monitoring':'#94a3b8'
  };

  function copyCmd(text, btn) {
    navigator.clipboard.writeText(text).then(function() {
      btn.classList.add('copied');
      var code = btn.querySelector('code');
      var orig = code.textContent;
      code.textContent = '✓ Copié !';
      setTimeout(function() {
        btn.classList.remove('copied');
        code.textContent = orig;
      }, 1500);
    });
  }

  function buildCell(cmd) {
    if (!cmd) {
      var td = document.createElement('td');
      td.className = 'na-cell';
      td.textContent = '—';
      return td;
    }
    var td = document.createElement('td');
    td.className = 'install-cell';
    var btn = document.createElement('button');
    btn.className = 'install-cmd';
    btn.title = 'Cliquer pour copier';
    btn.innerHTML =
      '<code>' + escHtml(cmd) + '</code>' +
      '<span class="copy-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>';
    btn.addEventListener('click', function() { copyCmd(cmd, btn); });
    td.appendChild(btn);
    return td;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable(pkgs) {
    var tbody = document.getElementById('pkgBody');
    tbody.innerHTML = '';
    var empty = document.getElementById('pkgEmpty');
    var count = document.getElementById('pkgCount');

    if (!pkgs.length) {
      empty.classList.add('show');
      count.textContent = '0';
      return;
    }
    empty.classList.remove('show');
    count.textContent = pkgs.length;

    // Grouper par catégorie
    var cats = [];
    var bycat = {};
    pkgs.forEach(function(p) {
      if (!bycat[p.cat]) { bycat[p.cat] = []; cats.push(p.cat); }
      bycat[p.cat].push(p);
    });

    cats.forEach(function(cat) {
      // Ligne de groupe
      var catRow = document.createElement('tr');
      catRow.className = 'cat-row';
      var catTd = document.createElement('td');
      catTd.colSpan = OS_KEYS.length + 1;
      catTd.textContent = '// ' + cat.toUpperCase();
      catTd.style.color = CAT_COLORS[cat] || 'var(--accent)';
      catRow.appendChild(catTd);
      tbody.appendChild(catRow);

      bycat[cat].forEach(function(pkg) {
        var tr = document.createElement('tr');
        tr.dataset.cat = pkg.cat;
        tr.dataset.name = pkg.name.toLowerCase();
        tr.dataset.desc = pkg.desc.toLowerCase();

        // Cellule nom
        var nameTd = document.createElement('td');
        nameTd.className = 'pkg-name-cell';
        var color = CAT_COLORS[pkg.cat] || 'var(--accent)';
        nameTd.innerHTML =
          '<span class="pkg-name">' + escHtml(pkg.name) + '</span>' +
          '<span class="pkg-desc">' + escHtml(pkg.desc) + '</span>' +
          '<span class="pkg-cat-badge" style="color:' + color + ';border-color:' + color + '">' + escHtml(pkg.cat) + '</span>';
        tr.appendChild(nameTd);

        OS_KEYS.forEach(function(os) {
          tr.appendChild(buildCell(pkg[os] || null));
        });

        tbody.appendChild(tr);
      });
    });
  }

  // ════════════════════════════════════════════════════
  // FILTRES
  // ════════════════════════════════════════════════════
  var activeCat = 'all';
  var searchQ   = '';

  function applyFilters() {
    var filtered = PACKAGES.filter(function(p) {
      if (activeCat !== 'all' && p.cat !== activeCat) return false;
      if (searchQ) {
        var hay = p.name.toLowerCase() + ' ' + p.desc.toLowerCase() + ' ' + p.cat.toLowerCase();
        OS_KEYS.forEach(function(os) { if (p[os]) hay += ' ' + p[os].toLowerCase(); });
        if (hay.indexOf(searchQ) === -1) return false;
      }
      return true;
    });
    renderTable(filtered);
  }

  document.getElementById('catBar').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-cat]');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  });

  document.getElementById('pkgSearch').addEventListener('input', function() {
    searchQ = this.value.toLowerCase().trim();
    applyFilters();
  });

  // Raccourci /
  document.addEventListener('keydown', function(e) {
    var tag = document.activeElement && document.activeElement.tagName;
    if (e.key === '/' && tag !== 'INPUT') {
      e.preventDefault();
      document.getElementById('pkgSearch').focus();
    }
    if (e.key === 'Escape' && tag === 'INPUT') document.activeElement.blur();
  });

  // ── THEME ──
  (function() {
    var html = document.documentElement;
    var saved = localStorage.getItem('mpx-theme');
    if (saved) html.setAttribute('data-theme', saved);
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var next = (html.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('mpx-theme', next);
    });
  })();

  // Rendu initial
  renderTable(PACKAGES);
  </script>
